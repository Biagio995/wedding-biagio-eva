# Blueprint Render.com — piano Free (web + Postgres; il servizio web va in sleep dopo inattività).
# Collega questo repo su https://dashboard.render.com → New → Blueprint → incolla l’URL del repo.
#
# Prima del primo deploy imposta nel dashboard (o qui sotto) almeno:
#   APP_KEY = output di: php artisan key:generate --show
#   APP_URL = https://<nome-servizio>.onrender.com
#   WEDDING_ADMIN_PASSWORD_HASH = hash bcrypt della password admin (vedi .env.example)
#
databases:
  - name: wedding-db
    databaseName: wedding
    user: wedding
    plan: free

services:
  - type: web
    name: wedding-web
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./laravel/Dockerfile
    dockerContext: ./laravel
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: wedding-db
          property: connectionString
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
